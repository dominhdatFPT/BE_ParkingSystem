spring:
  application:
    name: smart-parking
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:/etc/secrets/.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: ${SPRING_JPA_OPEN_IN_VIEW:false}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}
        jdbc:
          time_zone: ${SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE:UTC}

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: ${APP_JWT_EXPIRATION:900000}
  refresh-token:
    expiration-ms: ${APP_REFRESH_TOKEN_EXPIRATION_MS:2592000000}
  auth:
    refresh-cookie-name: ${APP_AUTH_REFRESH_COOKIE_NAME:refresh_token}
    refresh-cookie-path: ${APP_AUTH_REFRESH_COOKIE_PATH:/api/v1/auth}
    refresh-cookie-secure: ${APP_AUTH_REFRESH_COOKIE_SECURE:true}
    refresh-cookie-same-site: ${APP_AUTH_REFRESH_COOKIE_SAME_SITE:None}
    refresh-cookie-domain: ${APP_AUTH_REFRESH_COOKIE_DOMAIN:}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost,http://localhost:80,http://localhost:8080,http://localhost:5173,http://127.0.0.1,http://127.0.0.1:80,http://127.0.0.1:5173,https://*.vercel.app}

gemini:
  api-key: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

ekyc:
  provider: ${EKYC_PROVIDER:vnpt}
  base-url: ${EKYC_BASE_URL:https://api.idg.vnpt.vn}
  token: ${EKYC_TOKEN:}
  token-id: ${EKYC_TOKEN_ID:}
  license-plate-path: ${EKYC_LICENSE_PLATE_PATH:/v1/ocr/license-plate}
  validation-enabled: ${EKYC_VALIDATION_ENABLED:false}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  # usd = Stripe nhận số VNĐ dưới dạng cents ($80 cho 8000VNĐ) — dùng cho test account ngoài VN
  # vnd = Stripe nhận đúng VNĐ — dùng khi account được đăng ký tại Việt Nam với giá thực (>12.500đ)
  currency: ${STRIPE_CURRENCY:usd}
  order-expire-minutes: ${STRIPE_ORDER_EXPIRE_MINUTES:30}

crypto:
  aes-secret-key: ${CRYPTO_AES_SECRET_KEY}
